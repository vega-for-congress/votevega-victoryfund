name: "Aider: Issue to PR"

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  aider-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine relevant files
        id: files
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          FILES=""
          TEXT=$(echo "$ISSUE_TITLE $ISSUE_BODY" | tr '[:upper:]' '[:lower:]')

          if echo "$TEXT" | grep -qE 'config|navigation|menu|link|social|url|toml'; then
            FILES="$FILES hugo.toml"
          fi
          if echo "$TEXT" | grep -qE 'css|style|color|font|layout|responsive'; then
            FILES="$FILES static/css/style.css"
          fi
          if echo "$TEXT" | grep -qE 'homepage|hero|landing|home page'; then
            FILES="$FILES layouts/index.html"
          fi
          if echo "$TEXT" | grep -qE 'footer'; then
            FILES="$FILES layouts/partials/footer.html"
          fi
          if echo "$TEXT" | grep -qE 'header|navbar|nav'; then
            FILES="$FILES layouts/partials/header.html"
          fi
          if echo "$TEXT" | grep -qE 'policy|content'; then
            for f in content/policy/*.md; do
              [ -f "$f" ] && FILES="$FILES $f"
            done
          fi
          if echo "$TEXT" | grep -qE 'seo|meta|head|base template|baseof'; then
            FILES="$FILES layouts/_default/baseof.html"
          fi

          [ -z "$FILES" ] && FILES="hugo.toml"
          FILES=$(echo "$FILES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Build aider prompt
        id: prompt
        run: |
          cat > /tmp/aider_prompt.txt <<'EOF'
          You are working on a Hugo static site for a political campaign website (Jose Vega for Congress, NY-15).

          GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

          ${{ github.event.issue.body }}

          Implement the changes requested above. Key architecture notes:
          - Site config, social links, and nav are in hugo.toml params
          - Templates are in layouts/, partials in layouts/partials/
          - Content pages are Markdown in content/
          - Styles are in static/css/style.css
          - Only modify what is necessary
          - Do not change campaign messaging unless explicitly asked
          EOF
          # Make it a single line for aider_args
          PROMPT=$(cat /tmp/aider_prompt.txt | tr '\n' ' ' | sed 's/  */ /g')
          echo "prompt=$PROMPT" >> "$GITHUB_OUTPUT"

      - name: Create feature branch
        run: |
          git checkout -b aider/issue-${{ github.event.issue.number }}
          git push origin aider/issue-${{ github.event.issue.number }}

      - name: Run aider
        uses: mirrajabi/aider-github-action@v1.1.0
        with:
          model: openrouter/anthropic/claude-3-7-sonnet-20250219
          api_key_env_name: OPENROUTER_API_KEY
          api_key_env_value: ${{ secrets.OPENROUTER_API_KEY }}
          branch: aider/issue-${{ github.event.issue.number }}
          aider_args: >-
            --yes
            --read WARP.md
            --map-tokens 2048
            --message '${{ steps.prompt.outputs.prompt }}'
            ${{ steps.files.outputs.files }}

      - name: Check for changes
        id: changes
        run: |
          # Refresh refs after the aider Docker container pushed
          git fetch origin
          COMMITS=$(git rev-list --count origin/main..origin/aider/issue-${{ github.event.issue.number }})
          echo "Commits ahead of main: $COMMITS"
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        id: cpr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --head aider/issue-${{ github.event.issue.number }} \
            --base main \
            --title "fix: ${{ github.event.issue.title }}" \
            --body "Automated fix for #${{ github.event.issue.number }} generated by [aider](https://aider.chat).

          **Model:** anthropic/claude-3-7-sonnet-20250219

          > Please review carefully before merging. This is an AI-generated change.")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Extract PR number
        if: steps.changes.outputs.has_changes == 'true'
        id: pr_number
        run: |
          # PR URL format: https://github.com/owner/repo/pull/123
          PR_NUM=$(echo "${{ steps.cpr.outputs.pr_url }}" | grep -oE '[0-9]+$')
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram bot
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          curl -s -X POST "${{ secrets.TELEGRAM_BOT_WORKER_URL }}/notify" \
            -H "Authorization: Bearer ${{ secrets.TELEGRAM_NOTIFY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"issue_number": ${{ github.event.issue.number }}, "pr_url": "${{ steps.cpr.outputs.pr_url }}", "pr_number": ${{ steps.pr_number.outputs.number }}}' \
            || echo "Telegram notification failed (non-fatal)"

      - name: Comment on issue
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Aider has created a pull request with a proposed fix: ${{ steps.cpr.outputs.pr_url }}\n\nPlease review the changes before merging.`
            })

      - name: Comment on issue (no changes)
        if: steps.changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Aider analyzed this issue but was unable to produce code changes. A human developer should take a look.'
            })
