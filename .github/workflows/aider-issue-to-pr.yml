name: "Aider: Issue to PR"

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  aider-fix:
    # Only run when the "aider" label is added
    if: github.event.label.name == 'aider'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine relevant files
        id: files
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          FILES=""
          TEXT=$(echo "$ISSUE_TITLE $ISSUE_BODY" | tr '[:upper:]' '[:lower:]')

          if echo "$TEXT" | grep -qE 'config|navigation|menu|link|social|url|toml'; then
            FILES="$FILES hugo.toml"
          fi
          if echo "$TEXT" | grep -qE 'css|style|color|font|layout|responsive'; then
            FILES="$FILES static/css/style.css"
          fi
          if echo "$TEXT" | grep -qE 'homepage|hero|landing|home page'; then
            FILES="$FILES layouts/index.html"
          fi
          if echo "$TEXT" | grep -qE 'footer'; then
            FILES="$FILES layouts/partials/footer.html"
          fi
          if echo "$TEXT" | grep -qE 'header|navbar|nav'; then
            FILES="$FILES layouts/partials/header.html"
          fi
          if echo "$TEXT" | grep -qE 'policy|content'; then
            for f in content/policy/*.md; do
              [ -f "$f" ] && FILES="$FILES $f"
            done
          fi
          if echo "$TEXT" | grep -qE 'seo|meta|head|base template|baseof'; then
            FILES="$FILES layouts/_default/baseof.html"
          fi

          [ -z "$FILES" ] && FILES="hugo.toml"
          FILES=$(echo "$FILES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Build aider prompt
        id: prompt
        run: |
          cat > /tmp/aider_prompt.txt <<'EOF'
          You are working on a Hugo static site for a political campaign website (Jose Vega for Congress, NY-15).

          GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

          ${{ github.event.issue.body }}

          Implement the changes requested above. Key architecture notes:
          - Site config, social links, and nav are in hugo.toml params
          - Templates are in layouts/, partials in layouts/partials/
          - Content pages are Markdown in content/
          - Styles are in static/css/style.css
          - Only modify what is necessary
          - Do not change campaign messaging unless explicitly asked
          EOF
          # Make it a single line for aider_args
          PROMPT=$(cat /tmp/aider_prompt.txt | tr '\n' ' ' | sed 's/  */ /g')
          echo "prompt=$PROMPT" >> "$GITHUB_OUTPUT"

      - name: Run aider (dry run)
        uses: mirrajabi/aider-github-action@v1
        with:
          model: openrouter/anthropic/claude-3-7-sonnet-20250219
          api_key_env_name: OPENROUTER_API_KEY
          api_key_env_value: ${{ secrets.OPENROUTER_API_KEY }}
          branch: aider/issue-${{ github.event.issue.number }}
          aider_args: >-
            --yes
            --dry-run
            --read WARP.md
            --map-tokens 2048
            --message '${{ steps.prompt.outputs.prompt }}'
            ${{ steps.files.outputs.files }}

      - name: Dry run results
        run: |
          echo "=== AIDER DRY RUN COMPLETE ==="
          echo "Issue: #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
          echo "Files scoped: ${{ steps.files.outputs.files }}"
          echo "Model: openrouter/anthropic/claude-3-7-sonnet-20250219"
          echo ""
          echo "Changes that would have been made (dry run - nothing was committed):"
          git diff --stat || echo "No changes detected (aider --dry-run does not modify files)"
          echo ""
          echo "=== To enable real PRs, remove --dry-run and uncomment the PR steps ==="

